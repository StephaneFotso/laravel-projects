version: "3.8"

services:
  # PHP Service container
  laravel_eleven_app:
    platform: linux/amd64
    build:
      args:
        user: laravel_eleven_user
        uid: 1000
      context: .
      dockerfile: Dockerfile
    image: laravel_eleven_app_image
    container_name: laravel_eleven_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel_eleven_app_network
  #nginx service
  laravel_eleven_webserver:
    platform: linux/amd64
    image: nginx:alpine
    container_name: laravel_eleven_webserver_container
    restart: unless-stopped
    ports:
      - "6162:80"
    depends_on:
      - laravel_eleven_app
    volumes:
      - ./:/var/www
      - ./config/nginx/conf.d/:/etc/nginx/conf.d
    networks:
      - laravel_eleven_app_network

networks:
  laravel_eleven_app_network:
    driver: bridge
